<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Michelle's Contact</title>
        <link rel="stylesheet" href="../css/contact.css"/>
    </head>
    <body>
        <header>
            <h1>Michelle Hiu</h1>
            <nav>
                <a href="../index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>
        <main>
            <section class="contact" id="contactMe">
                <h2 class="subject">Contact Me</h2>
                <form action="#" method="get" class="contact-form">
                    <label for="input-name">Name:</label><br>
                    <input type="text" id="input-name" name="name" placeholder="What should I call you" required/><br>
                    <label for="input-email">Email:</label><br>
                    <input type="email" id="input-email" name="email" placeholder="Your email" required/><br>
                    <label for="form-message">Message:</label><br>
                    <textarea
                        id="form-message"
                        name="message"
                        placeholder="Write your message"
                        rows="5"
                        required
                    ></textarea>
                    <br>
                    <label for="reason">Reason for contact:</label><br>
                    <select id="reason" name="reason">
                        <option value="job">Job Opportunity</option>
                        <option value="collaboration">Collaboration</option>
                        <option value="feedback">Feedback</option>
                    </select>
                    <br><br>
                    <button type="reset">Reset</button>
                    <button type="submit">Send Message</button>
                </form>
            </section>
        </main>
        <footer>
            <div class="profile">
                <h3>Michelle Hiu</h3>
                <p>Jakarta, Indonesia</p>
            </div>
            <div class="navigation">
                <h3>Navigation</h3>
                <a href="../pages/about.html">About Me</a>
                <a href="../pages/projects.html">My Projects</a>
                <a href="../pages/contact.html">Contact Me</a>
            </div>
            <div class="socials">
                <h3>Socials</h3>
                <p>michelle.hiu05@gmail.com</p>
                <a href="https://www.linkedin.com/in/michelle-hiu-24a8792b3/">LinkedIn</a>
                <a href="https://github.com/MicelHiu">GitHub   </a>
            </div>
        </footer>
    </body>
</html>
